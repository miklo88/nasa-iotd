name: Post APOD to Instagram

# Schedules (all UTC). Times chosen to compensate for GitHub Actions'
# scheduled-workflow queue delay, which empirically runs ~60–90 min for
# this repo. Goal is for the *actual* post to land near 9 PM CT.
#
#   01:13 — primary: 8:13 PM CDT (Mar–Nov) / 7:13 PM CST (Nov–Mar) scheduled
#           → typical actual post around 9:15–9:45 PM CT
#   03:13 — recovery #1, +2h — catches primary if unusually delayed
#   05:13 — recovery #2, +4h — final safety net
#
# The :13 minute (instead of :00) dodges the top-of-hour queue congestion
# that hits GitHub Actions every hour on the hour.
#
# All three fires run the same job. The script's idempotency check (reads
# logs/YYYY-MM.jsonl for a status:"ok" entry from today UTC) makes the
# recovery fires no-op if the primary already succeeded.
#
# Also exposes a manual "Run workflow" button for test posts. Manual runs
# default to DRY_RUN=true; uncheck the box for a real publish.
#
# IMPORTANT: scheduled triggers only fire on the repo's default branch.
# Manual (workflow_dispatch) triggers work from any branch.
on:
  schedule:
    - cron: "13 1 * * *"  # primary  (01:13 UTC = 8:13 PM CDT / 7:13 PM CST)
    - cron: "13 3 * * *"  # recovery +2h
    - cron: "13 5 * * *"  # recovery +4h
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build caption and log it, but skip the actual IG publish (default: true for safety)"
        type: boolean
        default: true

# Prevent a recovery cron from racing the primary cron's git push. With
# cancel-in-progress: false the second fire just waits.
concurrency:
  group: post-apod
  cancel-in-progress: false

# `contents: write` is required so the job can commit the new log line back
# to the repo. Everything else stays default-read.
permissions:
  contents: write

jobs:
  post:
    name: Fetch APOD and publish to Instagram
    runs-on: ubuntu-latest
    # Must accommodate Layer 2's worst case:
    #   attempt 1 (6 min) + wait (1 min) + attempt 2 (6 min) ≈ 13 min.
    # 20 leaves comfortable headroom for checkout, setup-node, and commit-log
    # steps without ever cutting off mid-retry. Video (Reels) days need the
    # bigger budget because IG async video processing can take 1–4 minutes.
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Node 22 is the current LTS (supported through April 2027).
          # Node 20 still works but emits a deprecation warning on every run.
          node-version: "22"

      # Layer 2: step-level retry. If the script crashes entirely (in-script
      # Layer 1 retries exhausted, runner blip, etc.), wait 60 seconds and
      # run it again. The script's idempotency check prevents a double-post
      # if the first attempt actually succeeded before crashing.
      #
      # Why 60s and not 300s? Transient API blips usually clear in seconds
      # to a couple minutes; a 5-min wait mostly burns wall clock without
      # materially improving odds of recovery.
      - name: Post to Instagram
        id: post
        uses: nick-fields/retry@v4
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          # Schedule triggers don't pass inputs → inputs.dry_run is empty → empty
          # string in env → script treats as not-true → real post. Manual triggers
          # respect the checkbox, which defaults to true (dry run).
          DRY_RUN: ${{ inputs.dry_run }}
          TRIGGER: ${{ github.event_name }}
        with:
          # 6 min per attempt: images finish in ~15 s, videos need up to
          # ~4 min of async processing polling + a few seconds to publish.
          timeout_minutes: 6
          max_attempts: 2
          retry_wait_seconds: 60
          command: node poster/post-apod.mjs

      # Always run, even if the post step failed — we want failures recorded too.
      # The script writes the log line in its finally block, so by the time
      # we get here the file is either created or appended.
      - name: Commit log entry
        if: always()
        run: |
          if [[ -z "$(git status --porcelain logs/ 2>/dev/null)" ]]; then
            echo "No log changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull-rebase in case another commit landed on the branch between
          # checkout and now — unlikely for a once-a-day job but cheap insurance.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git add logs/
          git commit -m "log: APOD run $(date -u +%Y-%m-%d) [${{ github.event_name }}]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
